<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Successful</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            color: #333;
            font-size: 1.5rem;
            margin: 0 0 0.5rem;
        }
        p {
            color: #666;
            margin: 0;
        }
        .success-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Authentication Successful</h1>
        <p id="message">Completing login...</p>
    </div>

    <script>
        (function() {
            console.log('[OAuth Success] Page loaded');

            try {
                // Get the current URL to parse response data
                const urlParams = new URLSearchParams(window.location.search);
                const hashParams = new URLSearchParams(window.location.hash.substring(1));

                // Try to get data from URL parameters (if backend passes it this way)
                const accessToken = urlParams.get('accessToken') || hashParams.get('accessToken');
                const refreshToken = urlParams.get('refreshToken') || hashParams.get('refreshToken');
                const userData = urlParams.get('user') || hashParams.get('user');

                // Check if we're in a popup
                const isPopup = window.opener && window.opener !== window;

                if (accessToken && refreshToken) {
                    console.log('[OAuth Success] Found tokens in URL');

                    let user = null;
                    if (userData) {
                        try {
                            user = JSON.parse(decodeURIComponent(userData));
                        } catch (e) {
                            console.error('[OAuth Success] Failed to parse user data:', e);
                        }
                    }

                    // Store in localStorage
                    localStorage.setItem('accessToken', accessToken);
                    localStorage.setItem('refreshToken', refreshToken);
                    if (user) {
                        localStorage.setItem('userData', JSON.stringify(user));
                    }

                    if (isPopup) {
                        console.log('[OAuth Success] Sending message to parent window');

                        // Send success message to parent
                        window.opener.postMessage({
                            type: 'google-oauth-success',
                            data: {
                                accessToken,
                                refreshToken,
                                user
                            }
                        }, window.location.origin);

                        // Update UI
                        document.querySelector('.spinner').style.display = 'none';
                        document.querySelector('.success-icon').textContent = '✓';
                        document.getElementById('message').textContent = 'Closing window...';

                        // Close popup after a short delay
                        setTimeout(() => {
                            console.log('[OAuth Success] Closing popup');
                            window.close();
                        }, 1000);
                    } else {
                        // If not in popup, redirect to dashboard
                        console.log('[OAuth Success] Redirecting to dashboard');
                        document.getElementById('message').textContent = 'Redirecting to dashboard...';
                        setTimeout(() => {
                            window.location.href = '/dashboards';
                        }, 1000);
                    }
                } else {
                    // If no tokens in URL, try to extract from document body (if backend returns JSON)
                    console.log('[OAuth Success] No tokens in URL, checking document body');

                    const bodyText = document.body.textContent || document.body.innerText;

                    // Try to parse as JSON
                    try {
                        const data = JSON.parse(bodyText);
                        console.log('[OAuth Success] Parsed JSON from body:', data);

                        if (data.status === 'success' && data.data) {
                            const { accessToken, refreshToken, user, expiresIn } = data.data;

                            // Store in localStorage
                            localStorage.setItem('accessToken', accessToken);
                            localStorage.setItem('refreshToken', refreshToken);
                            localStorage.setItem('userData', JSON.stringify(user));

                            if (expiresIn) {
                                const expiryTime = Date.now() + (expiresIn * 1000);
                                localStorage.setItem('tokenExpiry', expiryTime.toString());
                            }

                            if (isPopup) {
                                console.log('[OAuth Success] Sending message to parent window');

                                window.opener.postMessage({
                                    type: 'google-oauth-success',
                                    data: {
                                        accessToken,
                                        refreshToken,
                                        user,
                                        expiresIn
                                    }
                                }, window.location.origin);

                                document.querySelector('.spinner').style.display = 'none';
                                document.getElementById('message').textContent = 'Login successful! Closing window...';

                                setTimeout(() => {
                                    window.close();
                                }, 1000);
                            } else {
                                window.location.href = '/dashboards';
                            }
                        } else {
                            throw new Error(data.message || 'Authentication failed');
                        }
                    } catch (e) {
                        console.error('[OAuth Success] Error processing authentication:', e);
                        document.querySelector('.spinner').style.display = 'none';
                        document.getElementById('message').textContent = 'Error: ' + e.message;

                        if (isPopup) {
                            window.opener.postMessage({
                                type: 'google-oauth-error',
                                message: e.message || 'Failed to process authentication'
                            }, window.location.origin);

                            setTimeout(() => window.close(), 3000);
                        }
                    }
                }
            } catch (error) {
                console.error('[OAuth Success] Unexpected error:', error);
                document.querySelector('.spinner').style.display = 'none';
                document.getElementById('message').textContent = 'An unexpected error occurred';

                if (window.opener) {
                    window.opener.postMessage({
                        type: 'google-oauth-error',
                        message: error.message || 'Unexpected error'
                    }, window.location.origin);
                }
            }
        })();
    </script>
</body>
</html>
